<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holistic Vision | SLT Baseline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { margin: 1rem 0 0.5rem; font-size: 1.6rem; }
        #video-frame { border: 2px solid #333; border-radius: 8px; background: #000; max-width: 100%; }
        #status { font-size: 0.85rem; color: #888; margin: 0.4rem 0; }
        #translation-box {
            margin: 0.8rem 0; padding: 0.8rem 1.2rem; background: #1a1a2e;
            border: 1px solid #333; border-radius: 8px; min-height: 2.5rem;
            max-width: 660px; width: 100%; font-size: 1.1rem; text-align: center;
        }
        #fps { position: fixed; top: 8px; right: 12px; font-size: 0.8rem; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Holistic Vision &#129311;</h1>
    <div id="status">Connecting...</div>
    <canvas id="video-frame" width="640" height="480"></canvas>
    <div id="translation-box">Translation will appear here</div>
    <div id="fps"></div>

    <script>
        const canvas = document.getElementById('video-frame');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const translationBox = document.getElementById('translation-box');
        const fpsEl = document.getElementById('fps');

        let frameCount = 0;
        let lastFpsTime = performance.now();
        let latestLandmarks = null;

        // --- Video WebSocket ---
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const videoWs = new WebSocket(`${wsProtocol}//${location.host}/ws/video`);
        videoWs.binaryType = 'blob';

        videoWs.onopen = () => { statusEl.textContent = 'Connected — streaming'; };
        videoWs.onclose = () => { statusEl.textContent = 'Disconnected'; };
        videoWs.onerror = () => { statusEl.textContent = 'Connection error'; };

        videoWs.onmessage = (event) => {
            if (event.data instanceof Blob) {
                // Binary = JPEG frame
                const url = URL.createObjectURL(event.data);
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);

                    frameCount++;
                    const now = performance.now();
                    if (now - lastFpsTime >= 1000) {
                        fpsEl.textContent = `${frameCount} FPS`;
                        frameCount = 0;
                        lastFpsTime = now;
                    }
                };
                img.src = url;
            } else {
                // Text = JSON landmark data
                const msg = JSON.parse(event.data);
                if (msg.type === 'landmarks') {
                    latestLandmarks = msg.data;
                    // Forward to translation WS if connected
                    if (translateWs && translateWs.readyState === WebSocket.OPEN) {
                        translateWs.send(JSON.stringify(msg.data));
                    }
                }
            }
        };

        // --- Translation WebSocket ---
        const translateWs = new WebSocket(`${wsProtocol}//${location.host}/ws/translate`);

        translateWs.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'translation' && msg.text) {
                translationBox.textContent = msg.text;
            }
        };
    </script>
</body>
</html>
